name: WakaTime Stats

on:
  schedule:
    # Se actualiza a la medianoche (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-readme:
    name: Update README with WakaTime Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write # Esto es VITAL en 2026 para permitir la escritura
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Versión actualizada
      
      - name: Update Waka Stats
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          SECTION_NAME: waka
          TIME_RANGE: all_time
          LANG_COUNT: 10
          SHOW_TIME: true
          SHOW_TOTAL: true
          SHOW_MASKED_TIME: false
          STOP_AT_OTHER: true
          BLOCKS: █
