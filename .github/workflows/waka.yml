name: WakaTime Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-readme:
    name: Update README with WakaTime Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pre-Flight Checks
        run: |
          echo "🔍 Iniciando validaciones..."
          
          # Check Etiquetas
          if grep -q "START_SECTION:waka" README.md && grep -q "END_SECTION:waka" README.md; then
            echo "✅ Etiquetas de sección encontradas."
          else
            echo "❌ ERROR: No se encontraron las etiquetas y "
            exit 1
          fi

          # Check Secret
          if [ -z "${{ secrets.WAKATIME_API_KEY }}" ]; then
            echo "❌ ERROR: El secret WAKATIME_API_KEY está vacío o no existe."
            exit 1
          else
            echo "✅ Secret detectado correctamente."
          fi

      - name: Update Waka Stats
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          SECTION_NAME: waka
          TIME_RANGE: all_time
          LANG_COUNT: 10
          SHOW_TIME: true
          SHOW_TOTAL: true
          SHOW_MASKED_TIME: false
          STOP_AT_OTHER: true
          BLOCKS: █

      - name: Post-Run Report
        run: |
          git status
          if git diff --name-only | grep -q "README.md"; then
            echo "🚀 ÉXITO: El README fue actualizado con nuevas estadísticas."
          else
            echo "⚠️ ADVERTENCIA: El README no cambió. Esto puede ser porque WakaTime no devolvió datos nuevos o el bot no encontró diferencias."
          fi
